syntax = "proto3";

package notification;

option go_package = "proto/notification;notificationpb";

service NotificationService {
  rpc SendEmail (SendEmailRequest) returns (SendEmailResponse);
  rpc SendBulkEmail (SendBulkEmailRequest) returns (SendBulkEmailResponse);
}

message SendEmailRequest {
  string request_id = 1;
  string to = 2;
  string subject = 3;
  string body = 4;
  bool is_html = 5;
}

message SendEmailResponse {
  string message_id = 1;
}

message Email {
  string to = 1;
  string subject = 2;
  string body = 3;
  bool is_html = 4;
}

message SendBulkEmailRequest {
  string request_id = 1;
  repeated Email emails = 2;
}

message SendBulkEmailResponse {
  int32 accepted = 1;
}