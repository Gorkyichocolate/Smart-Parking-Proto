syntax = "proto3";

package parking;

option go_package = "github.com/Gorkyichocolate/smart-parking-proto/gen/go/parking";

import "google/protobuf/timestamp.proto";

service ParkingService {
  rpc GetZones(GetZonesRequest) returns (GetZonesResponse);
  rpc GetZone(GetZoneRequest) returns (GetZoneResponse);
  rpc GetSpots(GetSpotsRequest) returns (GetSpotsResponse);
  rpc GetFreeSpots(GetFreeSpotsRequest) returns (GetFreeSpotsResponse);
  rpc CreateBooking(CreateBookingRequest) returns (CreateBookingResponse);
  rpc GetBooking(GetBookingRequest) returns (GetBookingResponse);
  rpc GetUserBookings(GetUserBookingsRequest) returns (GetUserBookingsResponse);
  rpc CancelBooking(CancelBookingRequest) returns (CancelBookingResponse);
}

message ParkingZone {
  string id = 1;
  string name = 2;
  string address = 3;
  int32 total_spots = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ParkingSpot {
  string id = 1;
  string zone_id = 2;
  string spot_number = 3;
  string status = 4;
  double price_per_hour = 5;
  google.protobuf.Timestamp created_at = 6;
}

message Booking {
  string id = 1;
  string user_id = 2;
  string spot_id = 3;
  google.protobuf.Timestamp start_time = 4;
  google.protobuf.Timestamp end_time = 5;
  double total_price = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// GetZones
message GetZonesRequest {}
message GetZonesResponse {
  repeated ParkingZone zones = 1;
}

// GetZone
message GetZoneRequest {
  string id = 1;
}
message GetZoneResponse {
  ParkingZone zone = 1;
}

// GetSpots
message GetSpotsRequest {
  string zone_id = 1;
}
message GetSpotsResponse {
  repeated ParkingSpot spots = 1;
}

// GetFreeSpots
message GetFreeSpotsRequest {
  string zone_id = 1;
}
message GetFreeSpotsResponse {
  repeated ParkingSpot spots = 1;
}

// CreateBooking
message CreateBookingRequest {
  string user_id = 1;
  string spot_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
}
message CreateBookingResponse {
  Booking booking = 1;
}

// GetBooking
message GetBookingRequest {
  string id = 1;
}
message GetBookingResponse {
  Booking booking = 1;
}

// GetUserBookings
message GetUserBookingsRequest {
  string user_id = 1;
}
message GetUserBookingsResponse {
  repeated Booking bookings = 1;
}

// CancelBooking
message CancelBookingRequest {
  string id = 1;
}
message CancelBookingResponse {
  bool success = 1;
}
