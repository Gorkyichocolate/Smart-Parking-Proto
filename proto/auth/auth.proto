// proto/auth/auth.proto
syntax = "proto3";

package auth;

option go_package = "github.com/Gorkyichocolate/smart-parking-proto/gen/go/auth;authpb";

import "google/protobuf/timestamp.proto";
import "common/common.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (common.Empty);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (common.StatusResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string role = 4;
}

message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
  string role = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message LogoutRequest {
  string access_token = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  common.User user = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  string full_name = 2;
  string email = 3;
}

message UpdateUserResponse {
  common.User user = 1;
}

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message GetUsersRequest {
  common.PaginationRequest pagination = 1;
  string role = 2;
}

message GetUsersResponse {
  repeated common.User users = 1;
  common.PaginationResponse pagination = 2;
}