# .github/workflows/generate-go.yml
name: Generate Go gRPC Code

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'proto/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'proto/**'

jobs:
  generate-go:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install protoc-gen-go and protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Go code
        run: |
          mkdir -p gen/go
          protoc --proto_path=proto \
            --go_out=gen/go --go_opt=paths=source_relative \
            --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative \
            proto/common/*.proto \
            proto/auth/*.proto \
            proto/parking/*.proto \
            proto/payment/*.proto \
            proto/notification/*.proto

      - name: Create go.mod
        run: |
          cd gen/go
          go mod init github.com/GorkiyChocolate/smart-parking-proto/gen/go
          go get google.golang.org/grpc
          go get google.golang.org/protobuf

      - name: Push generated code
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add gen/go/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate Go gRPC code [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}