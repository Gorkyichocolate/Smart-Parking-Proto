name: Generate Go Proto

on:
  push:
    branches: [ main ]
    paths:
      - 'proto/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go code
        run: |
          # Clean old generated files
          rm -rf gen/go
          mkdir -p gen/go
          
          # Generate all proto files
          protoc --proto_path=proto \
            --go_out=gen/go --go_opt=paths=source_relative \
            --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative \
            proto/common/*.proto \
            proto/auth/*.proto \
            proto/parking/*.proto \
            proto/payment/*.proto \
            proto/notification/*.proto
          
          echo "✅ Go code generated to gen/go/"

      - name: Update go.mod
        run: |
          cd gen/go
          
          # Create go.mod if not exists
          if [ ! -f "go.mod" ]; then
            cat > go.mod << 'EOF'
          module github.com/GorkiyChocolate/smart-parking-proto/gen/go
          
          go 1.21
          
          require (
              google.golang.org/grpc v1.62.0
              google.golang.org/protobuf v1.33.0
          )
          EOF
          fi
          
          go mod tidy
          echo "✅ go.mod updated"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add gen/go/
          git add proto/  # только если удалили .pb.go файлы
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate protobuf code [skip ci]"
            git push
            echo "✅ Changes pushed"
          else
            echo "ℹ️ No changes to commit"
          fi