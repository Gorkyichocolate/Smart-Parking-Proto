name: Generate Proto

on:
  push:
    paths:
      - '**.proto'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**.proto'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install protoc
        run: |
            cd /tmp
            curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v27.1/protoc-27.1-linux-x86_64.zip
            unzip -o protoc-27.1-linux-x86_64.zip -d $HOME/.local
            echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Check versions
        run: |
          protoc --version
          which protoc
          which protoc-gen-go
          which protoc-gen-go-grpc

      - name: Generate proto
        run: |
          protoc -I=. \
            --go_out=. --go_opt=paths=source_relative \
            --go-grpc_out=. --go-grpc_opt=paths=source_relative \
            proto/*/*.proto

      - name: Check for changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Proto files are not up to date. Run protoc locally."
            git status
            exit 1
          fi